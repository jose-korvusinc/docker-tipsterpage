<VirtualHost *:80>
        ServerName tipsterpage.test
        ServerAlias *.tipsterpage.test

        ServerAdmin jose@korvusinc.com
        # Ruta ajustada para Docker
        DocumentRoot /var/www/html/public

        # Bloque vital para el enrutamiento de Laravel
        <Directory /var/www/html/public>
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

<VirtualHost *:443>
        ServerName tipsterpage.test
        ServerAlias *.tipsterpage.test

        ServerAdmin jose@korvusinc.com
        # Ruta ajustada para Docker
        DocumentRoot /var/www/html/public

        # Bloque vital para el enrutamiento de Laravel
        <Directory /var/www/html/public>
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        SSLEngine on
        SSLCertificateFile /etc/apache2/ssl/apache.crt
        SSLCertificateKeyFile /etc/apache2/ssl/apache.key

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>