resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    listen 443 ssl;
    server_name tipsterpage.test;
    client_max_body_size 100M;
    ssl_certificate /etc/nginx/certs/apache.crt;
    ssl_certificate_key /etc/nginx/certs/apache.key;

    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        add_header 'Access-Control-Allow-Origin' 'https://admin.test' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_hide_header 'Content-Type';
        add_header 'Content-Type' 'image/png'; 
    }

    location / {
        set $upstream_landing landing;
        proxy_pass http://$upstream_landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
}

