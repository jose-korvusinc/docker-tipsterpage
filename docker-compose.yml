services:
  
  redis:
    image: redis:7-alpine
    container_name: redis_shared
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:5.0
    container_name: mongo_db
    platform: linux/arm64
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/dump 
      - mongodb_data:/data/db
      - ./scripts/import.sh:/docker-entrypoint-initdb.d/import.sh:ro
  
  landing:
    # build: ./landing
    container_name: landing_laravel
    build:
      context: .
      dockerfile: landing/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./envs/.env.landing
    volumes:
      - ./landing:/var/www/html
    depends_on:
      - redis
  
  apiekans:
    # build: ./apiekans
    container_name: apiekans_nest
    build:
      context: .
      dockerfile: apiekans/Dockerfile
    ports:
      - "4003:4003"
    env_file:
      - ./envs/.env.apiekans  
    volumes:
      - ./apiekans:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  pikachu-api:
    # build: ./pikachu-api
    container_name: pikachu_nest
    build:
      context: .
      dockerfile: pikachu-api/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tipsterpage-dev
      - MONGO_USER=
      - MONGO_PASS=
    ports:
      - "4001:4001"
    env_file:
      - ./envs/.env.apipikachu  
    volumes:
      - ./pikachu-api:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  apibagon:
    container_name: apibagon
    build:
      context: .
      dockerfile: apibagon/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tipsterpage-dev
      - MONGO_USER=
      - MONGO_PASS=
    ports:
      - "4002:4002"
    env_file:
      - ./envs/.env.apibagon  
    volumes:
      - ./apibagon:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  
  admin:
    # build: ./admin
    container_name: admin_angular
    platform: linux/arm64/v8
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./admin:/app
      - /app/node_modules 

  
  backend:
    container_name: firebase_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "2030:2030"
      - "4000:4000"
      - "8082:8082"
    volumes:
      - ./backend:/app
      - /app/functions/node_modules
      - /app/functions/lib
    depends_on:
      - redis
      - mongodb

volumes:
  mongodb_data: