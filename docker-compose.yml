services:
  # Este lo utilizo para administrar mysql
  adminer:
    image: adminer
    container_name: adminer_db
    restart: always
    ports:
      - "8080:8080"

  gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./base/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./base/apache/certs:/etc/nginx/certs:ro
    depends_on:
      - landing
      - affiliabet
      - apibagon

  redis:
    image: redis:7-alpine
    container_name: redis_shared
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:5.0
    container_name: mongo_db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
      - MONGO_INITDB_DATABASE=tipsterpage-dev
    platform: linux/arm64
    ports:
      - "27017:27017"
    volumes:
      # Si se desea restaurar la base de datos, descomentar las siguientes lineas y volver a levantar el contenedor
      # - ./base/dbbackups/mongo:/dump 
      # - ./base/scripts/importar.sh:/docker-entrypoint-initdb.d/importar.sh:ro
      - mongodb_data:/data/db

  mysql_db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      - MYSQL_DATABASE=affiliabet
      - MYSQL_ROOT_PASSWORD=root
    command: 
      - --innodb_buffer_pool_size=1G
      - --innodb_log_file_size=256M
      - --innodb_flush_log_at_trx_commit=0
      - --innodb_doublewrite=0
      - --max_allowed_packet=512M
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - mysql_data:/var/lib/mysql
      # Si se desea restaurar la base de datos, descomentar las siguientes lineas y volver a levantar el contenedor
      # - ./base/dbbackups/mysql/affiliabet/backup.sql:/docker-entrypoint-initdb.d/backup.sql:ro
      # - ./base/scripts/importar.sh:/docker-entrypoint-initdb.d/importar.sh:ro

  landing:
    container_name: landing_laravel
    build:
      context: .
      dockerfile: landing/Dockerfile
    volumes:
      - ./landing:/var/www/html
      - /var/www/html/vendor
      - ./base/apache/certs:/etc/apache2/ssl:ro
    depends_on:
      - redis
    extra_hosts:
      - "app.affiliabet.test:host-gateway"
      - "pikachu.test:host-gateway"

  affiliabet:
    container_name: affiliabet_laravel
    build:
      context: .
      dockerfile: affiliabet/Dockerfile
    volumes:
      - ./affiliabet:/var/www/html
      - /var/www/html/vendor
      - ./base/apache/certs:/etc/apache2/ssl:ro
    depends_on:
      - redis
      - mysql_db

  apibagon:
    container_name: apibagon
    build:
      context: .
      dockerfile: apibagon/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tipsterpage-dev
    ports:
      - "4002:4002"
    volumes:
      - ./apibagon:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  apiekans:
    container_name: apiekans
    build:
      context: .
      dockerfile: apiekans/Dockerfile
    ports:
      - "4003:4003" 
    volumes:
      - ./apiekans:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  apipikachu:
    container_name: apipikachu
    build:
      context: .
      dockerfile: apipikachu/Dockerfile
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tipsterpage-dev
    ports:
      - "4001:4001"
    volumes:
      - ./apipikachu:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongodb

  admin:
    container_name: admin_angular
    platform: linux/arm64/v8
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./admin:/app
      - /app/node_modules 

  backend:
    container_name: firebase_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "2030:2030"
      - "4000:4000"
      - "8082:8082"
    volumes:
      - ./backend:/app
      - /app/functions/node_modules
      - ./base/apache/certs:/etc/apache2/ssl:ro
      - /app/functions/lib
    depends_on:
      - redis
      - mongodb

volumes:
  mongodb_data:
  mysql_data: